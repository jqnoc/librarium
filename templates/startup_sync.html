<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarium — Syncing…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body class="user-select-page">
    <div class="user-select-container" style="text-align: center;">
        <div class="user-select-header">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Librarium" class="user-select-logo">
            <h1>Librarium</h1>
        </div>

        <div class="user-select-section">
            <div class="auth-waiting-spinner"></div>
            <h2 data-i18n="auth.syncingTitle">Syncing with Dropbox…</h2>
            <p class="auth-description" id="sync-progress" data-i18n="auth.syncingMessage">Downloading your library data. This may take a moment on the first launch.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
    <script>
    (function() {
        function poll() {
            fetch('/api/startup-status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.done) {
                        window.location.reload();
                    } else {
                        if (data.progress) {
                            document.getElementById('sync-progress').textContent = data.progress;
                        }
                        setTimeout(poll, 1000);
                    }
                })
                .catch(function() {
                    setTimeout(poll, 2000);
                });
        }
        setTimeout(poll, 1000);
    })();
    </script>
</body>
</html>

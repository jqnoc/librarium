{% extends "base.html" %}
{% block title %}404 – Librarium{% endblock %}

{% block content %}
<div class="error-page">
    <h1 class="error-code">404</h1>

    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" data-i18n="error.backHome">Back to library</a>
</div>
{% endblock %}

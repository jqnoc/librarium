{% extends "base.html" %}
{% block title %}Edit – {{ author_name }} – Librarium{% endblock %}

{% block content %}
<div style="margin-bottom: 1rem;">
    <a href="{{ url_for('author_detail', author_name=author_name) }}" class="btn btn-secondary btn-sm" data-i18n="editAuthor.backToAuthor">← Back to Author</a>
</div>

<h1 data-i18n="editAuthor.title">Edit Author Details</h1>
<p style="color: var(--lb-text-light); margin-bottom: 1.5rem;">{{ author_name }}</p>

<form method="POST" enctype="multipart/form-data" action="{{ url_for('edit_author', author_name=author_name) }}">
    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-body">
            <h3 style="margin-top:0;" data-i18n="editAuthor.photo">Photo</h3>
            {% if author_info.has_photo %}
            <div style="margin-bottom: 1rem;">
                <img src="{{ url_for('author_photo', author_name=author_name, v=author_info.get('photo_hash', '')) }}" alt="{{ author_name }}"
                     style="width: 150px; height: auto; border-radius: var(--lb-radius-lg); box-shadow: var(--lb-shadow);">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>
                    <input type="checkbox" name="remove_photo" value="1"> <span data-i18n="editAuthor.removePhoto">Remove current photo</span>
                </label>
            </div>
            {% endif %}
            <div class="form-group">
                <label for="photo" data-i18n="{{ 'editAuthor.replacePhoto' if author_info.has_photo else 'editAuthor.uploadPhoto' }}">{% if author_info.has_photo %}Replace Photo{% else %}Upload Photo{% endif %}</label>
                <input type="file" id="photo" name="photo" class="form-control" accept="image/*">
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-body">
            <h3 style="margin-top:0;" data-i18n="editAuthor.lifeDetails">Life Details</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="birth_date" data-i18n="editAuthor.born">Born</label>
                    <input type="text" id="birth_date" name="birth_date" class="form-control"
                           value="{{ author_info.birth_date }}"
                           placeholder="e.g. 1899-06-21 or June 21, 1899">
                </div>
                <div class="form-group">
                    <label for="birth_place" data-i18n="editAuthor.birthplace">Birthplace</label>
                    <input type="text" id="birth_place" name="birth_place" class="form-control"
                           value="{{ author_info.birth_place }}"
                           placeholder="e.g. Oak Park, Illinois, USA">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="death_date" data-i18n="editAuthor.died">Died</label>
                    <input type="text" id="death_date" name="death_date" class="form-control"
                           value="{{ author_info.death_date }}"
                           placeholder="e.g. 1961-07-02 or July 2, 1961">
                </div>
                <div class="form-group">
                    <label for="death_place" data-i18n="editAuthor.deathPlace">Place of Death</label>
                    <input type="text" id="death_place" name="death_place" class="form-control"
                           value="{{ author_info.death_place }}"
                           placeholder="e.g. Ketchum, Idaho, USA">
                </div>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-body">
            <h3 style="margin-top:0;" data-i18n="editAuthor.biography">Biography</h3>
            <div class="form-group">
                <textarea id="biography" name="biography" class="form-control" rows="6"
                          placeholder="A short summary of the author's life and work…">{{ author_info.biography }}</textarea>
            </div>
            <script>document.addEventListener('DOMContentLoaded',function(){window.librariumI18n.initRichTextToolbar('biography');});</script>
        </div>
    </div>

    <div class="btn-group">
        <button type="submit" class="btn btn-primary" data-i18n="editAuthor.saveChanges">💾 Save Changes</button>
        <a href="{{ url_for('author_detail', author_name=author_name) }}" class="btn btn-secondary" data-i18n="form.cancel">Cancel</a>
    </div>
</form>
{% endblock %}

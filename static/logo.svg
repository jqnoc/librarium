<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- Main radial gradient: deep-orange core → amber rim -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF5F00"/>
    </radialGradient>
    <!-- Subtle inner glow for depth -->
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#FFD400" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD400" stop-opacity="0"/>
    </radialGradient>
    <!-- Thin gold ring gradient -->
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD400"/>
      <stop offset="50%"  stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#FF5F00" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#ring)" stroke-width="3"/>

  <!-- Main disc -->
  <circle cx="100" cy="100" r="94" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Inner glow overlay -->
  <circle cx="100" cy="100" r="94" fill="url(#glow)"/>

  <!-- Hairline inner ring for polish -->
  <circle cx="100" cy="100" r="86" fill="none" stroke="#FFD400" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Japanese characters 足並 -->
  <text
    x="100" y="118"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', 'Noto Serif JP', serif"
    font-size="72"
    font-weight="700"
    text-anchor="middle"
    fill="#1A1A2E"
    fill-opacity="0.15"
    letter-spacing="2">足並</text>
  <text
    x="100" y="116"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', 'Noto Serif JP', serif"
    font-size="72"
    font-weight="700"
    text-anchor="middle"
    fill="#FFFFFF"
    letter-spacing="2">足並</text>
</svg>
